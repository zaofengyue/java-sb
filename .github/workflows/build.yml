name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build server.jar
        run: mvn -B -q package

      - name: Verify jar
        run: |
          test -f target/server.jar
          unzip -p target/server.jar META-INF/MANIFEST.MF | grep -i "Main-Class: com.nodesb.Main"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: target/server.jar

      # 滚动发布：固定用 "latest" 这个 tag，每次构建覆盖同一个 Release，
      # 不把 commit SHA 之类的东西塞进名字/tag 里
      - name: Publish to GitHub Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: server.jar（最新构建）
          files: target/server.jar
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
